<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Redeem Voucher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand:#1a56db; --brand-bg:#ebf0ff;
    --green:#0e9f6e; --green-bg:#def7ec;
    --red:#e02424;   --red-bg:#fde8e8;
    --amber:#c27803; --amber-bg:#fdf6b2;
    --text:#111827;  --muted:#6b7280;
    --border:#e5e7eb; --surface:#f9fafb; --white:#ffffff;
    --radius:12px;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--surface); color:var(--text); min-height:100vh; padding:0 0 40px; }
  header { background:var(--white); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:10px; }
  .logo { width:32px; height:32px; background:var(--brand); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo svg { width:18px; height:18px; }
  .title { font-size:16px; font-weight:600; }
  .sub { font-size:12px; color:var(--muted); margin-top:1px; }
  main { padding:20px 16px; max-width:480px; margin:0 auto; }
  .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:14px; }
  label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:6px; }
  input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; color:var(--text); background:var(--white); outline:none; -webkit-appearance:none; margin-bottom:12px; }
  input:focus { border-color:var(--brand); }
  #code { font-family:"SF Mono","Fira Code",monospace; font-size:20px; letter-spacing:0.15em; text-align:center; text-transform:uppercase; }
  input::placeholder { color:#d1d5db; }
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; border-radius:10px; font-size:15px; font-weight:600; border:none; cursor:pointer; }
  .btn:active { transform:scale(0.98); }
  .btn-primary { background:var(--brand); color:white; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-success { background:var(--green); color:white; margin-top:12px; }
  .btn-ghost { background:transparent; color:var(--muted); border:1.5px solid var(--border); margin-top:8px; }
  .result { border-radius:10px; padding:14px 16px; margin-top:14px; display:none; }
  .result.show { display:block; }
  .result-title { font-size:15px; font-weight:700; margin-bottom:4px; }
  .result-detail { font-size:13px; line-height:1.5; opacity:0.85; }
  .result.valid { background:var(--green-bg); }
  .result.invalid { background:var(--red-bg); }
  .result.warning { background:var(--amber-bg); }
  .result.valid   .result-title { color:var(--green); }
  .result.invalid .result-title { color:var(--red); }
  .result.warning .result-title { color:var(--amber); }
  .cust-box { background:white; border-radius:8px; padding:10px 12px; margin-top:10px; border:1px solid rgba(0,0,0,0.07); }
  .cust-name { font-size:18px; font-weight:700; color:var(--text); }
  .cust-mob  { font-size:14px; color:var(--muted); margin-top:3px; }
  .done { text-align:center; padding:30px 20px; display:none; }
  .done.show { display:block; }
  .done-icon { width:64px; height:64px; background:var(--green-bg); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .done-icon svg { width:34px; height:34px; stroke:var(--green); fill:none; }
  .done h2 { font-size:20px; font-weight:700; margin-bottom:6px; }
  .done p  { font-size:14px; color:var(--muted); line-height:1.6; }
  .done .ts { font-size:12px; color:var(--muted); margin-top:10px; }
  .log-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .log-item:last-child { border-bottom:none; }
  .log-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
  .log-code { font-family:monospace; font-size:12px; font-weight:600; flex:1; }
  .log-meta { font-size:11px; color:var(--muted); text-align:right; line-height:1.4; }
  .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .notice { background:var(--brand-bg); border-radius:8px; padding:10px 12px; font-size:12px; color:var(--brand); margin-bottom:12px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/>
      <line x1="12" y1="22" x2="12" y2="7"/>
      <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
      <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
    </svg>
  </div>
  <div>
    <div class="title">Redeem voucher</div>
    <div class="sub" id="retailer-display">Loading…</div>
  </div>
</header>

<main>

  <!-- Setup card — shown only first time -->
  <div id="setup-card" class="card" style="display:none">
    <div class="card-title">Your details — set once</div>
    <div class="notice">Enter your details once. They'll be saved on this device.</div>
    <label>Store name</label>
    <input type="text" id="setup-retailer" placeholder="e.g. FashionZone Surat">
    <label>Your mobile number</label>
    <input type="tel" id="setup-mobile" placeholder="9876543210" maxlength="10" inputmode="numeric">
    <label>City</label>
    <input type="text" id="setup-city" placeholder="Surat">
    <button class="btn btn-primary" onclick="saveRetailer()">Save and continue</button>
  </div>

  <!-- Verify card -->
  <div id="verify-card" class="card" style="display:none">
    <div class="card-title">Enter coupon code</div>
    <input type="text" id="code" placeholder="DISC-XXXXX"
      maxlength="15" autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="onCodeInput()">
    <button class="btn btn-primary" id="verify-btn" onclick="verifyCode()" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="verify-label">Verify code</span>
    </button>
    <div class="result" id="result-box">
      <div class="result-title" id="result-title"></div>
      <div class="result-detail" id="result-detail"></div>
      <div class="cust-box" id="cust-box" style="display:none">
        <div class="cust-name" id="cust-name"></div>
        <div class="cust-mob"  id="cust-mob"></div>
      </div>
    </div>
    <button class="btn btn-success" id="confirm-btn" onclick="redeemCode()" style="display:none">
      <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Confirm — apply ₹200 discount
    </button>
    <button class="btn btn-ghost" onclick="changeRetailer()" style="margin-top:16px;font-size:12px">Change store details</button>
  </div>

  <!-- Done card -->
  <div id="done-card" class="card" style="display:none">
    <div class="done show" id="done-section">
      <div class="done-icon">
        <svg stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Redeemed</h2>
      <p id="done-text"></p>
      <div class="ts" id="done-ts"></div>
      <button class="btn btn-ghost" onclick="resetForm()" style="margin-top:20px">Redeem another code</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-title">Today's redemptions at your outlet</div>
    <div id="log-list"><div style="font-size:13px;color:var(--muted)">No redemptions yet today.</div></div>
  </div>

</main>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbyPeSZfAaIFs3YhMp2MzD1r9hy3uvW4Oz9vYem-xtwbTMv05qzg88FmJ2emyRFk9mIC/exec";
// ─────────────────────────────────────────────────────────────

let currentCode  = "";
let verifiedData = null;
let todayLog     = [];

// ── Retailer setup ───────────────────────────────────────────
function loadRetailer() {
  const name = localStorage.getItem("r_name");
  if (name) {
    const city = localStorage.getItem("r_city") || "";
    document.getElementById("retailer-display").textContent = name + (city ? ", " + city : "");
    show("verify-card");
    hide("setup-card");
    hide("done-card");
  } else {
    show("setup-card");
    hide("verify-card");
    hide("done-card");
    document.getElementById("retailer-display").textContent = "Setup required";
  }
}

function saveRetailer() {
  const name = document.getElementById("setup-retailer").value.trim();
  if (!name) { alert("Enter your store name."); return; }
  localStorage.setItem("r_name",   name);
  localStorage.setItem("r_mobile", document.getElementById("setup-mobile").value.trim());
  localStorage.setItem("r_city",   document.getElementById("setup-city").value.trim());
  loadRetailer();
}

function changeRetailer() {
  show("setup-card");
  hide("verify-card");
  document.getElementById("setup-retailer").value = localStorage.getItem("r_name")   || "";
  document.getElementById("setup-mobile").value   = localStorage.getItem("r_mobile") || "";
  document.getElementById("setup-city").value     = localStorage.getItem("r_city")   || "";
}

// ── Code input ───────────────────────────────────────────────
function onCodeInput() {
  let v = document.getElementById("code").value.toUpperCase().replace(/[^A-Z0-9-]/g,"");
  document.getElementById("code").value = v;
  currentCode = v;
  document.getElementById("verify-btn").disabled = v.length < 4;
  hideResult();
  hide("confirm-btn");
  verifiedData = null;
}

// ── VERIFY via JSONP (bypasses CORS) ─────────────────────────
function verifyCode() {
  const code = document.getElementById("code").value.trim().toUpperCase();
  if (!code) return;
  setLoading(true);
  hideResult();
  hide("confirm-btn");

  jsonp(API_URL + "?action=verify&code=" + encodeURIComponent(code), function(data) {
    setLoading(false);
    handleVerifyResult(code, data);
  }, function() {
    setLoading(false);
    showResult("invalid", "Connection error", "Could not reach server. Check your internet and try again.");
  });
}

function handleVerifyResult(code, data) {
  currentCode = code;
  if (data.status === "active") {
    verifiedData = data;
    showResult("valid", "✓ Valid — ₹200 discount", "");
    document.getElementById("cust-box").style.display = "block";
    document.getElementById("cust-name").textContent  = data.customer_name || "Customer";
    document.getElementById("cust-mob").textContent   = data.mobile ? "Mobile: " + data.mobile : "";
    show("confirm-btn");
  } else if (data.status === "already_redeemed") {
    showResult("invalid", "Already redeemed",
      "Used at " + (data.redeemed_where || "another outlet") + (data.redeemed_at ? " on " + data.redeemed_at : "") + ".");
  } else if (data.status === "expired") {
    showResult("warning", "Code expired", "This voucher has passed its expiry date.");
  } else if (data.status === "not_found") {
    showResult("invalid", "Code not found", "Double-check the code and try again.");
  } else {
    showResult("invalid", "Error", data.error || "Something went wrong. Try again.");
  }
}

// ── REDEEM via JSONP ─────────────────────────────────────────
function redeemCode() {
  if (!verifiedData || !currentCode) return;
  const btn = document.getElementById("confirm-btn");
  btn.disabled     = true;
  btn.textContent  = "Processing…";

  const retailer = localStorage.getItem("r_name")   || "";
  const mobile   = localStorage.getItem("r_mobile") || "";
  const city     = localStorage.getItem("r_city")   || "";

  const url = API_URL
    + "?action=redeem"
    + "&code="             + encodeURIComponent(currentCode)
    + "&retailer="         + encodeURIComponent(retailer)
    + "&retailer_mobile="  + encodeURIComponent(mobile)
    + "&city="             + encodeURIComponent(city);

  jsonp(url, function(data) {
    if (data.status === "redeemed") {
      showDone(data);
    } else {
      btn.disabled    = false;
      btn.textContent = "Confirm — apply ₹200 discount";
      showResult("invalid", "Could not redeem", data.error || "Try again.");
    }
  }, function() {
    btn.disabled    = false;
    btn.textContent = "Confirm — apply ₹200 discount";
    showResult("invalid", "Connection error", "Check your internet and try again.");
  });
}

function showDone(data) {
  hide("verify-card");
  show("done-card");
  document.getElementById("done-text").textContent = "₹200 discount applied for " + (data.customer_name || "customer") + ".";
  document.getElementById("done-ts").textContent   = data.timestamp ? "Logged at " + data.timestamp : "";
  todayLog.unshift({ code: currentCode, name: data.customer_name || "", ts: data.timestamp || "" });
  renderLog();
  verifiedData = null;
}

function resetForm() {
  document.getElementById("code").value = "";
  hide("done-card");
  hide("confirm-btn");
  show("verify-card");
  hideResult();
  verifiedData = null;
  currentCode  = "";
  document.getElementById("verify-btn").disabled = true;
}

// ── JSONP helper ─────────────────────────────────────────────
// Uses a <script> tag instead of fetch() — completely avoids CORS
function jsonp(url, onSuccess, onError) {
  const cbName = "cb_" + Date.now();
  const script = document.createElement("script");
  const timer  = setTimeout(function() {
    cleanup();
    if (onError) onError();
  }, 10000); // 10s timeout

  window[cbName] = function(data) {
    cleanup();
    onSuccess(data);
  };

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  script.onerror = function() { cleanup(); if (onError) onError(); };
  script.src = url + "&callback=" + cbName;
  document.head.appendChild(script);
}

// ── UI helpers ────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = "block"; }
function hide(id) { document.getElementById(id).style.display = "none"; }

function showResult(type, title, detail) {
  const box = document.getElementById("result-box");
  box.className = "result show " + type;
  document.getElementById("result-title").textContent = title;
  document.getElementById("result-detail").textContent = detail;
  document.getElementById("cust-box").style.display = "none";
}
function hideResult() {
  document.getElementById("result-box").className = "result";
}
function setLoading(on) {
  document.getElementById("spinner").style.display    = on ? "block" : "none";
  document.getElementById("verify-label").textContent = on ? "Checking…" : "Verify code";
  document.getElementById("verify-btn").disabled      = on;
}

function renderLog() {
  const el = document.getElementById("log-list");
  if (!todayLog.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted)">No redemptions yet today.</div>';
    return;
  }
  el.innerHTML = todayLog.map(r =>
    `<div class="log-item">
      <div class="log-dot"></div>
      <div class="log-code">${r.code}</div>
      <div class="log-meta">${r.name}<br><span style="font-size:10px">${r.ts}</span></div>
    </div>`
  ).join("");
}

// ── Enter key on code field ───────────────────────────────────
document.getElementById("code").addEventListener("keydown", function(e) {
  if (e.key === "Enter") verifyCode();
});

// ── Init ──────────────────────────────────────────────────────
loadRetailer();
</script>
</body>
</html>
